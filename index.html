<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA Weekly Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#11151C;color:#D7DCE6;min-height:100vh;padding:1.5rem 1rem 3rem}
.planner{max-width:1120px;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:1.25rem;align-items:start}
.sidebar{display:flex;flex-direction:column;gap:12px;position:sticky;top:1.5rem}
.sidebar .panel{margin-bottom:0}
.sidebar .panel-body{display:block !important}
@media(max-width:820px){.two-col{grid-template-columns:1fr}.sidebar{position:static}}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.header-text h1{font-size:22px;font-weight:600;color:#F0B859}
.header-text p{font-size:13px;color:#8FA3C2;margin-top:2px}
.inv-btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #e5e1db;background:#fff;color:#444;cursor:pointer;white-space:nowrap}
.inv-btn:hover{background:#f0ede8}
.jon-banner{background:#EAF3DE;border:1px solid #8FAF6E;border-radius:8px;padding:7px 12px;font-size:12px;color:#3B6D11;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.progress-wrap{margin-bottom:1rem}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#8FA3C2;margin-bottom:6px}
.progress-track{height:8px;border-radius:6px;background:#1C2333;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:#F0B859;transition:width .3s ease}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#8B96A8}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cards{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem}
.card{background:#fff;border-radius:12px;border:1px solid #e5e1db;border-left:4px solid #ccc;padding:1rem 1.25rem;transition:opacity .2s}
.card.cooked{opacity:.4}
.card.urgent{border-left-color:#D85A30}
.card.mid{border-left-color:#BA7517}
.card.later{border-left-color:#3B6D11}
.card.leftover{border-left-color:#185FA5}
.day-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}
.meal-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-top:3px;line-height:1.3}
.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:7px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-time{background:#EAF3DE;color:#3B6D11}
.badge-protein{background:#E6F1FB;color:#185FA5}
.badge-leftover{background:#FFF3CD;color:#856404}
.badge-nocock{background:#FFF3CD;color:#856404}
.badge-solo{background:#f2ede8;color:#888;border:1px solid #e0dbd4}
.badge-couple{background:#EAF3DE;color:#3B6D11}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#f5f2ec;border:1px solid #e5e1db;color:#555}
.card-note{font-size:12px;color:#999;margin-top:8px;font-style:italic;line-height:1.5}
.ingredient-notes{margin-top:8px;padding:0;list-style:none}
.ingredient-notes li{font-size:12px;color:#7a6e5f;line-height:1.5;padding:3px 0;border-top:1px solid #eee8df}
.ingredient-notes li strong{color:#5a5040}
.recipe-selector{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.recipe-option{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:5px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s}
.recipe-option:hover{background:#f5f2ec}
.recipe-option.selected{background:#EAF3DE;border-color:#8FAF6E}
.recipe-option.dimmed{opacity:.5}
.recipe-option input[type=radio]{accent-color:#2D5016;cursor:pointer;flex-shrink:0}
.recipe-option a{color:#C4873A;text-decoration:none;flex:1}
.recipe-option a:hover{text-decoration:underline}
.recipe-option .gap-tag{font-size:10px;color:#856404;background:#FFF3CD;padding:1px 6px;border-radius:10px;margin-left:4px;white-space:nowrap}
.single-recipe{margin-top:9px}
.recipe-link{font-size:12px;color:#C4873A;text-decoration:none}
.recipe-link:hover{text-decoration:underline}
.recipe-link::before{content:"→ "}
.swap-result{margin-top:10px;padding:10px 12px;border-radius:8px;background:#E6F1FB;border:1px solid #b5d4f4;font-size:13px;color:#1a1a1a;line-height:1.6}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.serving-toggle{display:flex;border-radius:8px;border:1px solid #ccc;overflow:hidden}
.serving-btn{font-size:11px;padding:4px 10px;background:none;border:none;cursor:pointer;color:#666}
.serving-btn.active{background:#2D5016;color:#fff}
.swap-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid #ccc;background:none;color:#666;cursor:pointer}
.swap-btn:hover{background:#f5f2ec}
.swap-btn:disabled{opacity:.5;cursor:default}
.cook-check{display:flex;align-items:center;gap:5px;font-size:12px;color:#999;margin-left:auto;cursor:pointer;user-select:none}
.cook-check input{cursor:pointer;accent-color:#2D5016}
.panel{border-radius:12px;border:1px solid #e5e1db;overflow:hidden;margin-bottom:12px}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 1.25rem;background:#f5f2ec;cursor:pointer;font-size:14px;font-weight:600;color:#2D5016;user-select:none}
.panel-header:hover{background:#eee9e1}
.panel-chev{font-size:16px;color:#999}
.panel-body{padding:1rem 1.25rem;background:#fff;border-top:1px solid #e5e1db}
.prep-section{margin-bottom:1rem}
.prep-section:last-child{margin-bottom:0}
.prep-section h3{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.prep-item{font-size:13px;color:#1a1a1a;padding:5px 0;border-bottom:1px solid #f0ede8;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.prep-item:last-child{border-bottom:none}
.prep-dot{width:6px;height:6px;border-radius:50%;background:#ccc;margin-top:7px;flex-shrink:0}
.prep-emoji{font-size:14px;line-height:1.5;flex-shrink:0}
.prep-item strong{font-weight:600}
.thaw-item{font-size:13px;color:#1a1a1a;padding:6px 0;border-bottom:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.thaw-item:last-child{border-bottom:none}
.thaw-pending{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#FFF3CD;color:#856404;white-space:nowrap}
.thaw-done{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#EAF3DE;color:#3B6D11;white-space:nowrap}
.shop-group{margin-bottom:1rem}
.shop-group:last-of-type{margin-bottom:0}
.shop-group h3{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.shop-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ede8;font-size:13px;color:#1a1a1a;cursor:pointer;user-select:none}
.shop-item:last-child{border-bottom:none}
.shop-item input{cursor:pointer;accent-color:#2D5016;flex-shrink:0}
.shop-item.checked{color:#aaa;text-decoration:line-through}
.shop-item .shop-source{font-size:10px;color:#999;margin-left:auto;white-space:nowrap}
.copy-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #ccc;background:#f5f2ec;color:#555;cursor:pointer;margin-top:12px}
.copy-btn:hover{background:#eee9e1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e1db;padding:1.25rem;width:90%;max-width:380px;max-height:80vh;overflow-y:auto}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal h2{font-size:16px;font-weight:600;color:#2D5016}
.modal-close{font-size:22px;cursor:pointer;color:#999;line-height:1;background:none;border:none}
.modal-close:hover{color:#1a1a1a}
.inv-note{font-size:11px;color:#aaa;margin-bottom:10px}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.inv-row:last-child{border-bottom:none}
.inv-qty{color:#999;font-size:12px}
.no-data{text-align:center;padding:3rem 1rem;color:#8B96A8}
.no-data h2{font-size:18px;font-weight:600;color:#F0B859;margin-bottom:8px}
.no-data p{font-size:14px;line-height:1.6;color:#A3AEC0}
.no-data code{background:#1C2333;padding:2px 6px;border-radius:4px;font-size:12px;color:#8FB3D9}
</style>
</head>
<body>

<div class="planner" id="root"></div>

<div class="modal-overlay" id="invModal" style="display:none" onclick="if(event.target===this)closeInv()">
  <div class="modal">
    <div class="modal-top">
      <h2>&#10052; Freezer inventory</h2>
      <button class="modal-close" onclick="closeInv()">×</button>
    </div>
    <div class="inv-note" id="invNote"></div>
    <div id="invList"></div>
  </div>
</div>

<script>
// ============================================================
// PASTE YOUR PLAN_DATA BLOCK HERE EACH WEEK.
// Replace everything between the START and END markers.
// ============================================================

// === PLAN_DATA START ===
// === PLAN_DATA START ===

      "Cucumbers: store whole and unwashed — once cut, use within 2 days",
      "Zucchini/squash: store whole and unwashed — hold for Thursday",
      "Baby fennel: trim fronds, store in a zip bag — good through Thursday",
      "Carrots: peel and cut for snacking now, store in water-covered container all week",
      "Cone cabbage: store whole and unwashed — good through Saturday and beyond",

    ],
    nightOf: {
      "Tuesday": "Cook pasta 1 min shy of al dente — it finishes in the sauce. Add Asian greens right at the end. Make extra sauce for Wed.",

      "Friday": "Pat salmon completely dry before searing. Kale goes in the same pan after — it loves the fond.",
      "Saturday": "Assess what's left and build the frittata around it. Broil the last 3-4 minutes for a golden top."
    },
    thawSchedule: [
      { protein: "Chicken breasts x2 (for tex-mex)", instruction: "Thawing now", status: "done" },
      { protein: "Kielbasa sausages (for Mon cabbage stir-fry)", instruction: "Thawing now", status: "done" },
      { protein: "Salmon fillets (2 x 6 oz)", instruction: "Pull Thu night → cook Friday", status: "pending" }
    ]
  },
  baseShoppingList: {
    "Dairy & Eggs": [
      "Eggs (6-8 count, for Saturday frittata)",
      "Butter (if running low)"
    ],
    "Pantry & Sauces": [
      "Red pepper flakes (if low)",

// === PLAN_DATA END ===
// === PLAN_DATA END ===

// ============================================================
// END OF EDITABLE SECTION — do not edit below this line
// ============================================================

// ── localStorage helpers ──────────────────────────────────────────────────────
const LS_PREFIX = 'csa-planner-';
const weekKey = () => PLAN_DATA ? PLAN_DATA.weekLabel.replace(/\s+/g,'-') : 'unknown';
const lsGet = (k) => { try { return JSON.parse(localStorage.getItem(LS_PREFIX + weekKey() + '-' + k)); } catch { return null; } };
const lsSet = (k, v) => { try { localStorage.setItem(LS_PREFIX + weekKey() + '-' + k, JSON.stringify(v)); } catch {} };

// ── state ─────────────────────────────────────────────────────────────────────
let servings = [];
let cooked = [];
let shopChecked = {};
let swapResults = [];
let selectedRecipes = [];

function initState() {
  if (!PLAN_DATA) return;
  const n = PLAN_DATA.meals.length;
  servings        = lsGet('servings')        || PLAN_DATA.meals.map(m => m.servings || 2);
  cooked          = lsGet('cooked')          || Array(n).fill(false);
  shopChecked     = lsGet('shopChecked')     || {};
  selectedRecipes = lsGet('selectedRecipes') || Array(n).fill(0);
  swapResults     = Array(n).fill(null);
  while (servings.length < n) servings.push(2);
  while (cooked.length < n)   cooked.push(false);
  while (selectedRecipes.length < n) selectedRecipes.push(0);
}

// ── build merged shopping list ────────────────────────────────────────────────
function getMergedShopList() {
  const base = PLAN_DATA.baseShoppingList || PLAN_DATA.shoppingList || {};
  const merged = {};

  // start with base items
  Object.entries(base).forEach(([cat, items]) => {
    if (!items || !items.length) return;
    if (!merged[cat]) merged[cat] = [];
    items.forEach(item => {
      merged[cat].push({ text: item, source: null });
    });
  });

  // add gap ingredients from each meal's selected recipe
  PLAN_DATA.meals.forEach((m, i) => {
    const recipes = m.recipes || [];
    const selIdx = selectedRecipes[i] || 0;
    const recipe = recipes[selIdx];
    if (!recipe || !recipe.gapIngredients || !recipe.gapIngredients.length) return;

    const cat = 'Recipe-specific';
    if (!merged[cat]) merged[cat] = [];
    recipe.gapIngredients.forEach(item => {
      // deduplicate
      const existing = Object.values(merged).flat();
      if (!existing.some(e => e.text.toLowerCase() === item.toLowerCase())) {
        merged[cat].push({ text: item, source: m.day + ': ' + recipe.label.split(' — ')[0] });
      }
    });
  });

  return merged;
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');

  if (!PLAN_DATA) {
    root.innerHTML = `
      <div class="no-data">
        <h2>No plan loaded yet</h2>
        <p>Each Friday, run the CSA Planner skill in Claude.<br>
        Copy the <code>PLAN_DATA</code> block and paste it into<br>
        <code>index.html</code> via the GitHub editor, then commit.</p>
      </div>`;
    return;
  }

  let html = `
    <div class="header">
      <div class="header-text">
        <h1>${esc(PLAN_DATA.weekLabel)}</h1>
      </div>
      <button class="inv-btn" onclick="openInv()">&#10052; Freezer inventory</button>
    </div>`;

  if (PLAN_DATA.jonNote) {
    html += `<div class="jon-banner">&#9992; ${esc(PLAN_DATA.jonNote)}</div>`;
  }

  const totalNights = PLAN_DATA.meals.length;
  const cookedCount = PLAN_DATA.meals.reduce((n, m, i) => n + (cooked[i] ? 1 : 0), 0);
  const pct = totalNights ? Math.round((cookedCount / totalNights) * 100) : 0;
  html += `
    <div class="progress-wrap">
      <div class="progress-label"><span>${cookedCount} of ${totalNights} nights cooked</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  html += `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Use first (2–3 days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Mid-week (4–5 days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Flexible / any night</div>
      <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Leftovers</div>
    </div>
    <div class="two-col">
    <div class="cards">`;

  PLAN_DATA.meals.forEach((m, i) => {
    const isLO = m.urgency === 'leftover';
    const srv  = servings[i] || 2;

    const timeBadge = m.cook
      ? `<span class="badge badge-time">&#128336; ${esc(m.cook)}</span>`
      : `<span class="badge badge-nocock">no cook</span>`;

    const protBadge = isLO
      ? `<span class="badge badge-leftover">${esc(m.protein)}</span>`
      : `<span class="badge badge-protein">${esc(m.protein)}</span>`;

    const srvBadge = srv === 1
      ? `<span class="badge badge-solo">solo night</span>`
      : `<span class="badge badge-couple">2 people ♡</span>`;

    const chips = (m.ingredients || []).map(x => `<div class="chip">${esc(x)}</div>`).join('');

    // recipe selection
    const recipes = m.recipes || [];
    const selIdx = selectedRecipes[i] || 0;
    let recipeHTML = '';

    if (recipes.length > 1) {
      recipeHTML = `<div class="recipe-selector">`;
      recipes.forEach((r, ri) => {
        const isSel = ri === selIdx;
        const gapCount = (r.gapIngredients || []).length;
        const gapTag = gapCount > 0 ? `<span class="gap-tag">${gapCount} extra item${gapCount > 1 ? 's' : ''}</span>` : '';
        recipeHTML += `
          <label class="recipe-option${isSel ? ' selected' : ' dimmed'}" onclick="selRecipe(${i},${ri})">
            <input type="radio" name="recipe-${i}" ${isSel ? 'checked' : ''}>
            <a href="${esc(r.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(r.label)}</a>
            ${gapTag}
          </label>`;
      });
      recipeHTML += `</div>`;
    } else if (recipes.length === 1) {
      const r = recipes[0];
      const gapCount = (r.gapIngredients || []).length;
      const gapTag = gapCount > 0 ? `<span class="gap-tag" style="margin-left:6px">${gapCount} extra item${gapCount > 1 ? 's' : ''}</span>` : '';
      recipeHTML = `<div class="single-recipe"><a class="recipe-link" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.label)}</a>${gapTag}</div>`;
    }

    const swapHTML = swapResults[i]
      ? `<div class="swap-result">${esc(swapResults[i])}</div>` : '';

    const swapBtn = isLO ? '' :
      `<button class="swap-btn" id="swp${i}" onclick="doSwap(${i})">&#8635; Swap meal</button>`;

    html += `
      <div class="card ${esc(m.urgency)}${cooked[i] ? ' cooked' : ''}">
        <div class="day-label">${esc(m.day)} · ${esc(m.date)}</div>
        <div class="meal-title">${esc(m.title)}</div>
        <div class="badges">${timeBadge}${protBadge}${srvBadge}</div>
        ${chips ? `<div class="chips">${chips}</div>` : ''}
        ${m.note ? `<div class="card-note">${esc(m.note)}</div>` : ''}
        ${m.ingredientNotes && m.ingredientNotes.length ? `<ul class="ingredient-notes">${m.ingredientNotes.map(n => {const parts = n.split(':'); return parts.length > 1 ? `<li><strong>${esc(parts[0])}:</strong>${esc(parts.slice(1).join(':'))}</li>` : `<li>${esc(n)}</li>`;}).join('')}</ul>` : ''}
        ${recipeHTML}
        ${swapHTML}
        <div class="card-footer">
          <div class="serving-toggle">
            <button class="serving-btn${srv===1?' active':''}" onclick="setSrv(${i},1)">1 person</button>
            <button class="serving-btn${srv===2?' active':''}" onclick="setSrv(${i},2)">2 people</button>
          </div>
          ${swapBtn}
          <label class="cook-check">
            <input type="checkbox" ${cooked[i]?'checked':''} onchange="togCooked(${i})"> &#10003; cooked
          </label>
        </div>
      </div>`;
  });

  html += `</div>
    <div class="sidebar">`;

  // ── prep timeline panel ──
  const pt = PLAN_DATA.prepTimeline;
  let prepHTML = '';
  if (pt) {
    if (pt.arrival && pt.arrival.length) {
      prepHTML += `<div class="prep-section"><h3>When the box arrives</h3>`;
      pt.arrival.forEach(t => {
        const parts = t.split(':');
        const emoji = ingredientEmoji(parts[0]);
        const body = parts.length > 1
          ? `<strong>${esc(parts[0])}:</strong>${esc(parts.slice(1).join(':'))}`
          : esc(t);
        prepHTML += `<div class="prep-item"><span class="prep-emoji">${emoji}</span>${body}</div>`;
      });
      prepHTML += `</div>`;
    }
    if (pt.nightOf && Object.keys(pt.nightOf).length) {
      prepHTML += `<div class="prep-section"><h3>Night-of notes</h3>`;
      Object.entries(pt.nightOf).forEach(([day, note]) => {
        prepHTML += `<div class="prep-item"><div class="prep-dot"></div><strong>${esc(day)}:</strong>&nbsp;${esc(note)}</div>`;
      });
      prepHTML += `</div>`;
    }
    if (pt.thawSchedule && pt.thawSchedule.length) {
      prepHTML += `<div class="prep-section"><h3>Thaw schedule</h3>`;
      pt.thawSchedule.forEach(t => {
        const badge = t.status === 'done'
          ? `<span class="thaw-done">&#10003; In fridge</span>`
          : `<span class="thaw-pending">${esc(t.instruction)}</span>`;
        prepHTML += `<div class="thaw-item"><span>${esc(t.protein)}</span>${badge}</div>`;
      });
      prepHTML += `</div>`;
    }
  }

  html += `
    <div class="panel">
      <div class="panel-header" onclick="togPanel('prepBody','prepChev')">
        <span>&#128197; Prep timeline &amp; thaw schedule</span>
        <span class="panel-chev" id="prepChev">&#8964;</span>
      </div>
      <div id="prepBody" style="display:block">
        <div class="panel-body">${prepHTML || '<p style="font-size:13px;color:#aaa">No prep data.</p>'}</div>
      </div>
    </div>`;

  // ── dynamic shopping list panel ──
  const merged = getMergedShopList();
  let shopHTML = '';
  let shopIdx = 0;
  let allItems = [];

  Object.entries(merged).forEach(([cat, items]) => {
    if (!items || !items.length) return;
    shopHTML += `<div class="shop-group"><h3>${esc(cat)}</h3>`;
    items.forEach(item => {
      const idx = shopIdx++;
      const checked = shopChecked[idx] || false;
      const sourceTag = item.source ? `<span class="shop-source">${esc(item.source)}</span>` : '';
      shopHTML += `<label class="shop-item${checked?' checked':''}" id="si${idx}" onclick="togShop(${idx})">
        <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();togShop(${idx})"> ${esc(item.text)}${sourceTag}
      </label>`;
      allItems.push(item.text + (item.source ? ' (' + item.source + ')' : ''));
    });
    shopHTML += `</div>`;
  });

  html += `
    <div class="panel">
      <div class="panel-header" onclick="togPanel('shopBody','shopChev')">
        <span>&#128722; Gap shopping list</span>
        <span class="panel-chev" id="shopChev">&#8964;</span>
      </div>
      <div id="shopBody" style="display:block">
        <div class="panel-body">
          ${shopHTML || '<p style="font-size:13px;color:#aaa">No shopping gaps this week.</p>'}
          <button class="copy-btn" onclick="copyShop()">&#10064; Copy list</button>
        </div>
      </div>
    </div>
    </div>
    </div>`;

  root.innerHTML = html;
}

// ── interactions ──────────────────────────────────────────────────────────────
function setSrv(i, n) {
  servings[i] = n;
  lsSet('servings', servings);
  render();
}

function togCooked(i) {
  cooked[i] = !cooked[i];
  lsSet('cooked', cooked);
  render();
}

function selRecipe(mealIdx, recipeIdx) {
  selectedRecipes[mealIdx] = recipeIdx;
  lsSet('selectedRecipes', selectedRecipes);
  // reset shop checkboxes when recipe selection changes (list items shift)
  shopChecked = {};
  lsSet('shopChecked', shopChecked);
  render();
}

function togShop(idx) {
  shopChecked[idx] = !shopChecked[idx];
  lsSet('shopChecked', shopChecked);
  const el = document.getElementById(`si${idx}`);
  if (el) el.classList.toggle('checked');
  const cb = el ? el.querySelector('input') : null;
  if (cb) cb.checked = shopChecked[idx];
}

function togPanel(bodyId, chevId) {
  const b = document.getElementById(bodyId);
  const c = document.getElementById(chevId);
  if (!b) return;
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  c.innerHTML = open ? '&#8964;' : '&#8963;';
}

async function doSwap(i) {
  const m = PLAN_DATA.meals[i];
  const btn = document.getElementById(`swp${i}`);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Thinking…';

  const srv = servings[i] || 2;
  const prompt = `I'm planning a weeknight dinner for ${srv === 1 ? '1 person (solo)' : '2 people'}. Night: ${m.day}. My CSA this week has: ${PLAN_DATA.csaInventory}. I need one alternative to "${m.title}". Constraints: no shellfish, no olives, no regular/English peas (snow peas ok). Cook time under 35 min. Bold globally-influenced flavors (Asian, Mexican/Latin, or American comfort). Suggest ONE alternative: meal name, key CSA ingredients, protein (or vegetarian), and one real recipe URL. Format: **[Meal name]** — [one sentence description]. Uses: [CSA items]. Protein: [protein]. Recipe: [URL]`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    swapResults[i] = data.content?.find(b => b.type === 'text')?.text || 'No suggestion returned.';
  } catch (e) {
    swapResults[i] = 'Could not reach the API. Check your connection.';
  }
  render();
}

function openInv() {
  if (!PLAN_DATA) return;
  document.getElementById('invNote').textContent = 'After this week\'s commitments';
  const list = document.getElementById('invList');
  list.innerHTML = (PLAN_DATA.freezerInventory || []).map(item =>
    `<div class="inv-row"><span>${esc(item.name)}</span><span class="inv-qty">${esc(item.qty)}</span></div>`
  ).join('') || '<p style="font-size:13px;color:#aaa">No inventory data.</p>';
  document.getElementById('invModal').style.display = 'flex';
}

function closeInv() {
  document.getElementById('invModal').style.display = 'none';
}

function copyShop() {
  const merged = getMergedShopList();
  const text = Object.entries(merged).map(([cat, items]) =>
    items && items.length ? `${cat.toUpperCase()}\n${items.map(i => `- ${i.text}${i.source ? ' (' + i.source + ')' : ''}`).join('\n')}` : ''
  ).filter(Boolean).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target.closest('button');
    const orig = btn.innerHTML;
    btn.innerHTML = '&#10003; Copied!';
    setTimeout(() => btn.innerHTML = orig, 2000);
  });
}

function ingredientEmoji(text) {
  const t = text.toLowerCase();
  const map = [
    [/asian greens|mixed greens|arugula|spinach/, '🥬'],
    [/red leaf lettuce|lettuce/, '🥬'],
    [/scallion|green onion/, '🌱'],
    [/cucumber/, '🥒'],
    [/zucchini|squash/, '🥒'],
    [/baby fennel|fennel/, '🌿'],
    [/carrot/, '🥕'],
    [/cone cabbage|savoy cabbage|cabbage/, '🥬'],
    [/lacinato kale|kale/, '🥬'],
    [/garlic/, '🧄'],
    [/tomato/, '🍅'],
    [/basil|parsley|cilantro|herb/, '🌿'],
    [/bell pepper|pepper/, '🫑'],
    [/jalape/, '🌶️'],
    [/sardine/, '🐟'],
    [/salmon/, '🐟'],
    [/chicken/, '🍗'],
    [/beef/, '🥩'],
    [/pork/, '🥩'],
    [/kielbasa|sausage/, '🌭'],
    [/shrimp/, '🍤'],
    [/egg/, '🥚'],
    [/yogurt|kefir/, '🥛'],
    [/kimchi/, '🥬'],
    [/chickpea|bean/, '🫘'],
    [/pasta|bigoli|noodle/, '🍝'],
    [/bread/, '🍞'],
    [/blueberr/, '🫐'],
    [/cucumber/, '🥒'],
    [/lemon|lime|citrus/, '🍋'],
    [/cheese|parmesan/, '🧀']
  ];
  for (const [re, emoji] of map) {
    if (re.test(t)) return emoji;
  }
  return '📦';
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── boot ──────────────────────────────────────────────────────────────────────
initState();
render();
</script>
